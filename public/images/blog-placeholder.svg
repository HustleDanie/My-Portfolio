<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>
  <g opacity="0.18">
    <circle cx="280" cy="340" r="120" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle cx="280" cy="340" r="180" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle cx="900" cy="340" r="80" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle cx="900" cy="340" r="140" fill="none" stroke="#ffffff" stroke-width="1"/>
    <line x1="400" y1="340" x2="780" y2="340" stroke="#ffffff" stroke-width="1" stroke-dasharray="4 6"/>
  </g>
  <text x="600" y="600" text-anchor="middle" font-family="monospace" font-size="14" fill="#ffffff" fill-opacity="0.35" letter-spacing="6">AI / ML JOURNAL</text>
</svg>
